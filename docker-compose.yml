# ============================================================
# ContractFlow Demo — docker compose up
# ============================================================
# Profiles:
#   (default)          : postgres, minio, api, agent, signature-mock, frontend
#   --profile observability : ajoute Langfuse + ClickHouse pour le tracing LLM

services:

  # ──────────────────────────────────────────────
  # Infrastructure
  # ──────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-contractflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-contractflow_secret}
      POSTGRES_DB: ${POSTGRES_DB:-contractflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-contractflow} -d ${POSTGRES_DB:-contractflow}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin_secret}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin_secret} &&
      mc mb --ignore-existing local/contracts &&
      mc mb --ignore-existing local/archives &&
      mc mb --ignore-existing local/signed-docs &&
      mc anonymous set download local/signed-docs &&
      echo 'MinIO buckets ready'
      "

  # ──────────────────────────────────────────────
  # Observabilité (optionnel)
  # docker compose --profile observability up
  # ──────────────────────────────────────────────

  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    profiles: ["observability"]
    restart: unless-stopped
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-clickhouse}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse_secret}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  langfuse:
    image: langfuse/langfuse:3
    profiles: ["observability"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-contractflow}:${POSTGRES_PASSWORD:-contractflow_secret}@postgres:5432/langfuse
      NEXTAUTH_URL: http://localhost:3002
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-changeme_langfuse_nextauth_32chars}
      SALT: ${LANGFUSE_SALT:-changeme_salt_32chars_minimum_ok}
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"
      CLICKHOUSE_MIGRATION_URL: clickhouse://${CLICKHOUSE_USER:-clickhouse}:${CLICKHOUSE_PASSWORD:-clickhouse_secret}@clickhouse:9000/default
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-clickhouse}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse_secret}
      LANGFUSE_INIT_ORG_ID: "contractflow"
      LANGFUSE_INIT_ORG_NAME: "ContractFlow Demo"
      LANGFUSE_INIT_PROJECT_ID: "contractflow-project"
      LANGFUSE_INIT_PROJECT_NAME: "ContractFlow"
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-pk-lf-contractflow-demo}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-sk-lf-contractflow-demo}
    ports:
      - "3002:3000"

  # ──────────────────────────────────────────────
  # Backend Services
  # ──────────────────────────────────────────────

  api:
    build:
      context: ./backend/api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-contractflow}:${POSTGRES_PASSWORD:-contractflow_secret}@postgres:5432/${POSTGRES_DB:-contractflow}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin_secret}
      MINIO_SECURE: "false"
      AGENT_SERVICE_URL: http://agent:8001
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  agent:
    build:
      context: ./backend/agent
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      api:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-contractflow}:${POSTGRES_PASSWORD:-contractflow_secret}@postgres:5432/${POSTGRES_DB:-contractflow}
      # LangGraph checkpointer needs psycopg3 format (pas asyncpg)
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-contractflow}:${POSTGRES_PASSWORD:-contractflow_secret}@postgres:5432/${POSTGRES_DB:-contractflow}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin_secret}
      MINIO_SECURE: "false"
      LLM_BASE_URL: http://ollama:11434/v1
      LLM_API_KEY: ollama
      SIGNATURE_MOCK_URL: http://signature-mock:8002
      API_SERVICE_URL: http://api:8000
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: http://langfuse:3000
      LLM_MODEL_FAST: llama3.2:3b
      LLM_MODEL_SMART: llama3.2:3b
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  signature-mock:
    build:
      context: ./backend/signature-mock
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-contractflow}:${POSTGRES_PASSWORD:-contractflow_secret}@postgres:5432/${POSTGRES_DB:-contractflow}
      AGENT_CALLBACK_URL: http://agent:8001/webhooks/signature
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # LLM local (Ollama — 100% open source, gratuit)
  # ──────────────────────────────────────────────

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 30s
      retries: 15
      start_period: 20s

  # Télécharge les modèles une seule fois (cached dans le volume ollama_data)
  # Premier démarrage : ~5 min selon la connexion
  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: >
      /bin/sh -c "
        sleep 5 &&
        ollama pull llama3.2:3b &&
        ollama pull qwen2.5:7b ||
        echo 'qwen2.5:7b indisponible - llama3.2:3b sera utilise pour les deux modeles' &&
        echo 'Init terminee.'
      "

  # ──────────────────────────────────────────────
  # Frontend
  # ──────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
        VITE_AGENT_URL: ""
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      agent:
        condition: service_healthy
    ports:
      - "3000:80"

volumes:
  postgres_data:
  minio_data:
  clickhouse_data:
  ollama_data:
